site_name: Hyrox Team Performance Optimizer
site_description: Documentazione di Project Management
site_url: https://andreazavatta.github.io/Hyrox-Training-PM/
theme:
  name: material
  language: it
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Passa alla modalità scura
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Passa alla modalità chiara

docs_dir: docs
site_dir: site

nav:
  - Home: index.md
  - 0. Contesto: 0-Contesto/0-contesto.md
  - 1. Scoping:
    - Panoramica: 1-Scoping/scoping.md
    - Allegati:
      - Project Overview Statement (POS): allegati/1-pos.md
      - Conditions of Satisfaction (CoS): allegati/2-cos.md
      - Approccio Metodologico: allegati/3-Descrizione_dellapproccio.md
      - Requirements Breakdown Structure (RBS): allegati/4-rbs.md
      - Analisi dei Rischi: allegati/5-analisi_rischi.md
      - Analisi Finanziaria: allegati/6-analisi_finanziaria.md
  - 2. Planning:
    - Panoramica: 2-Planning/planning.md
    - Allegati:
      - Working Agreements: allegati/1-working_agreements.md
      - Product Backlog: allegati/2-product_backlog.md
      - Release Roadmap: allegati/3-release_roadmap.md
      - Governance & Communication: allegati/4-governance_and_communication.md
  - 3. Launching: 3-Launching/launching.md
  - 4. Monitoring & Controlling: 4-Monitoring_Controlling/monitoring_and_controlling.md
  - 5. Closing: 5-Closing/closing.md
